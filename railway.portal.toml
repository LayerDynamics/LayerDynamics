# Railway config for the @layerdynamics/portal PROVIDER service (the Fastify
# server), kept separate from the root railway.toml (which builds the static
# apps/client site via Dockerfile). Both services deploy from this same repo
# root, so the portal service is pointed at THIS file via its
# "Config-as-code" / railway_config_file setting to avoid inheriting the
# client's Dockerfile.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.portal"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
