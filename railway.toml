# Railway deployment config for the LayerDynamics 3D portfolio (apps/client).
#
# Built from the repo-root Dockerfile (multi-stage: pnpm/Vite build -> static
# `serve -s dist`, which gives react-router its SPA history fallback). Docker is
# used instead of Nixpacks because Nixpacks couldn't put pnpm on PATH for this
# monorepo (no root deps), failing the build with exit 127 / $NIXPACKS_PATH
# undefined. The container listens on $PORT, which Railway injects.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
